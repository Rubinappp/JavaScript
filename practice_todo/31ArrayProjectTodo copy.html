<!DOCTYPE html>
<html >
<head>

  <title>Todo list</title>
</head>
<body>
  <p>Todo List</p>
  <input placeholder="Todo name" class="js-name-input">
   <input type="date" class="js-date-input">
  <button onclick="
  addTodo()
 ">Add</button>

  <div class="js-todo-list"></div>



  <script>
const todolist={ 
  todo:["washDish",'play'],
  todo_date:[]


}
function addTodo(){
 js_element= document.querySelector('.js-name-input');
 js_element1= document.querySelector('.js-date-input');

 todo_value=js_element.value
 todo_vdate=js_element1.value

 todolist.todo.push(todo_value);
 todolist.todo_date.push(todo_vdate);

 js_element.value='';
 js_element1.value='';

 rendertodo();

}
console.log(todolist)

function rendertodo(){

let variable=''
for (let i=0;i<todolist.todo.length;i++){
value=todolist.todo[i]
date_value=todolist.todo_date[i]
html=`
<p>${value} ${date_value}
  <button onclick="
  todolist.todo.splice(${i},1);
  todolist.todo_date.splice(${i},1);
  rendertodo();">delete</button></p>`

variable+=html
}
document.querySelector('.js-todo-list').innerHTML=variable
}
  </script>
</body>
</html>
